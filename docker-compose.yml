services:
  birthdayy:
    build:
      context: .
    container_name: birthdayy
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      influxdb:
        condition: service_started
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: birthdayy
      DB_PASSWORD: birthdayy
      DB_NAME: birthdayy
      DB_AUTO_MIGRATE: true
    env_file:
      - src/.env
      - src/.env.development.local
    image: ghcr.io/birthdayybot/birthdayy:latest
    logging:
      options:
        max-size: '1g'
        max-file: '3'
    networks:
      - birthdayy
    restart: always
    tty: true

  mysql:
    container_name: birthdayy-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: birthdayy
      MYSQL_USER: birthdayy
      MYSQL_PASSWORD: birthdayy
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    image: 'mysql:8.4'
    logging:
      options:
        max-size: '20m'
        max-file: '3'
    networks:
      - birthdayy
    ports:
      - '3306:3306'
    restart: always
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    command: 'redis-server --requirepass redis'
    container_name: birthdayy-redis
    image: 'redis:alpine'
    logging:
      options:
        max-size: '20m'
        max-file: '3'
    networks:
      - birthdayy
    ports:
      - '6379:6379'
    restart: always

  influxdb:
    command: 'influxd run --bolt-path /var/lib/influxdb2/influxd.bolt --engine-path /var/lib/influxdb2/engine --store bolt'
    container_name: birthdayy-influxdb
    image: 'influxdb:2.8-alpine'
    logging:
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - birthdayy
    ports:
      - '1425:8086'
    restart: always
    volumes:
      - influxdb-data:/var/lib/influxdb2

volumes:
  influxdb-data:
  mysql-data:

networks:
  birthdayy:
